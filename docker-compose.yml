services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: financial-data-tracker-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
      MSSQL_SA_PASSWORD: "${SQL_SERVER_PASSWORD:-FinancialDataTracker_DevPassword_123!}"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/1433'"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - financial-data-tracker-network

  server:
    build:
      context: ./server/FinancialDataTracker
      dockerfile: Dockerfile
    container_name: financial-data-tracker-server
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__SqlServer: "Server=sqlserver,1433;Database=FinancialDataTrackerDb;User Id=sa;Password=${SQL_SERVER_PASSWORD:-FinancialDataTracker_DevPassword_123!};TrustServerCertificate=True;Encrypt=False;"
      FinnhubApiCredentials__BaseUrl: "https://finnhub.io/api/v1"
      FinnhubApiCredentials__ApiKey: "${FINNHUB_API_KEY:-YOUR_FINNHUB_API_KEY}"
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - "5250:8080"
    networks:
      - financial-data-tracker-network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: financial-data-tracker-client
    depends_on:
      - server
    ports:
      - "4200:80"
    networks:
      - financial-data-tracker-network

volumes:
  sqlserver-data:

networks:
  financial-data-tracker-network:
    driver: bridge
